// ============================================================
// COUCHE DE PERSISTANCE — abstraite pour permettre un branchement
// futur sur Supabase/Firestore sans toucher aux composants.
// Chaque "espace bar" = une clé localStorage dérivée du mot de passe.
// ============================================================
const STORAGE_PREFIX = "campardoise::bar::";
const SESSION_KEY = "campardoise::session";

function loadBarState(barPassword) {
  const raw = localStorage.getItem(STORAGE_PREFIX + barPassword);
  if (!raw) return null;
  try {
    return JSON.parse(raw);
  } catch {
    return null;
  }
}
function saveBarState(barPassword, state) {
  localStorage.setItem(STORAGE_PREFIX + barPassword, JSON.stringify(state));
}
function barExists(barPassword) {
  return localStorage.getItem(STORAGE_PREFIX + barPassword) !== null;
}

// Hook: état du bar synchronisé avec localStorage + écoute des autres onglets/appareils
// (le "temps réel" en environnement mono-navigateur repose sur l'event `storage` +
// un polling léger pour couvrir les mises à jour de même onglet ; le contrat de données
// est conçu pour qu'un simple remplacement de ces deux fonctions par des abonnements
// Supabase realtime rende l'app multi-appareil sans changer le reste du code).
function useBarState(barPassword) {
  const [state, setState] = useState(() => (barPassword ? loadBarState(barPassword) : null));
  const stateRef = useRef(state);
  stateRef.current = state;

  useEffect(() => {
    if (!barPassword) return;
    const fresh = loadBarState(barPassword);
    setState(fresh);
  }, [barPassword]);

  // Écoute des changements faits par d'autres onglets/appareils (storage event)
  useEffect(() => {
    if (!barPassword) return;
    const key = STORAGE_PREFIX + barPassword;
    const onStorage = (e) => {
      if (e.key === key && e.newValue) {
        try {
          setState(JSON.parse(e.newValue));
        } catch {}
      }
    };
    window.addEventListener("storage", onStorage);
    // Polling léger (500ms) pour couvrir les cas où l'event storage ne se déclenche pas
    const interval = setInterval(() => {
      const raw = localStorage.getItem(key);
      if (!raw) return;
      if (raw !== JSON.stringify(stateRef.current)) {
        try {
          setState(JSON.parse(raw));
        } catch {}
      }
    }, 700);
    return () => {
      window.removeEventListener("storage", onStorage);
      clearInterval(interval);
    };
  }, [barPassword]);

  const update = useCallback(
    (updater) => {
      setState((prev) => {
        const next = typeof updater === "function" ? updater(prev) : updater;
        if (barPassword) saveBarState(barPassword, next);
        return next;
      });
    },
    [barPassword]
  );

  return [state, update];
}

// ============================================================
// ÉCRAN D'ACCUEIL — Auth simplifiée par mot de passe de session
// ============================================================
function AuthScreen({ onEnter }) {
  const [password, setPassword] = useState("");
  const [mode, setMode] = useState(null); // 'create' | 'join'
  const [error, setError] = useState("");

  const handleCreate = () => {
    const pwd = password.trim();
    if (!pwd) return setError("Merci de saisir un mot de passe pour créer l'espace.");
    if (barExists(pwd)) {
      setError("Un espace existe déjà avec ce mot de passe. Utilisez « Rejoindre un Bar existant ».");
      return;
    }
    saveBarState(pwd, SEED);
    onEnter(pwd);
  };

  const handleJoin = () => {
    const pwd = password.trim();
    if (!pwd) return setError("Merci de saisir le mot de passe du bar à rejoindre.");
    if (!barExists(pwd)) {
      setError("Aucun espace ne correspond à ce mot de passe. Créez-le d'abord.");
      return;
    }
    onEnter(pwd);
  };

  return (
    <div className="min-h-screen bg-slate-950 flex items-center justify-center p-6">
      <div className="w-full max-w-sm">
        <div className="text-center mb-10">
          <div className="inline-flex items-center justify-center w-16 h-16 rounded-3xl bg-indigo-600 mb-4 shadow-lg shadow-indigo-950/50">
            <Wine className="w-8 h-8 text-white" />
          </div>
          <h1 className="text-3xl font-extrabold text-white tracking-tight">Camp'Ardoise</h1>
          <p className="text-slate-400 mt-1 text-sm">Le carnet de notes du bar, sans papier.</p>
        </div>

        <div className="bg-slate-900 rounded-3xl p-6 shadow-xl border border-slate-800">
          <label className="block text-sm font-semibold text-slate-300 mb-2">
            Mot de passe de session
          </label>
          <input
            type="text"
            value={password}
            onChange={(e) => {
              setPassword(e.target.value);
              setError("");
            }}
            placeholder="Ex: chesnaie2026"
            className="w-full h-14 px-4 rounded-2xl bg-slate-800 text-white text-lg placeholder-slate-500 border border-slate-700 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/40"
            autoFocus
          />
          {error && (
            <div className="mt-3 flex items-start gap-2 text-amber-400 text-sm bg-amber-950/40 border border-amber-900 rounded-xl p-3">
              <AlertTriangle className="w-4 h-4 mt-0.5 shrink-0" />
              <span>{error}</span>
            </div>
          )}

          <div className="mt-6 space-y-3">
            <button
              onClick={handleCreate}
              className="w-full h-14 rounded-2xl bg-indigo-600 hover:bg-indigo-500 active:scale-[0.98] transition text-white font-bold text-base shadow-lg shadow-indigo-950/40"
            >
              Créer un espace Bar
            </button>
            <button
              onClick={handleJoin}
              className="w-full h-14 rounded-2xl bg-slate-800 hover:bg-slate-700 active:scale-[0.98] transition text-white font-bold text-base border border-slate-700"
            >
              Rejoindre un Bar existant
            </button>
          </div>
        </div>
        <p className="text-center text-slate-600 text-xs mt-6">
          Tous les appareils utilisant le même mot de passe partagent en direct
          les mêmes catégories, produits et ardoises clients.
        </p>
      </div>
    </div>
  );
}

function TopBar({ title, onBack, right }) {
  return (
    <div className="sticky top-0 z-20 bg-slate-950/95 backdrop-blur border-b border-slate-800 px-4 py-3 flex items-center gap-3">
      {onBack && (
        <button
          onClick={onBack}
          className="w-11 h-11 rounded-2xl bg-slate-900 flex items-center justify-center active:scale-95 transition shrink-0"
        >
          <ArrowLeft className="w-5 h-5 text-slate-300" />
        </button>
      )}
      <h1 className="text-lg font-bold text-white truncate flex-1">{title}</h1>
      {right}
    </div>
  );
}

function Modal({ children, onClose, maxW = "max-w-md" }) {
  return (
    <div
      className="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4"
      onClick={onClose}
    >
      <div
        className={`w-full ${maxW} bg-slate-900 rounded-t-3xl sm:rounded-3xl border border-slate-800 shadow-2xl max-h-[90vh] overflow-y-auto`}
        onClick={(e) => e.stopPropagation()}
      >
        {children}
      </div>
    </div>
  );
}

function timeAgo(iso) {
  const diffMs = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return "à l'instant";
  if (mins < 60) return `il y a ${mins} min`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `il y a ${hrs} h`;
  return new Date(iso).toLocaleDateString("fr-FR");
}

// ============================================================
// ONGLET 1 — NOTES CLIENTS (ardoises actives)
// ============================================================
function ClientNotesTab({ bar, updateBar, onOpenClient }) {
  const [search, setSearch] = useState("");
  const [showNewModal, setShowNewModal] = useState(false);
  const [duplicateWarning, setDuplicateWarning] = useState(null); // { name, existing }

  const activeNotes = (bar.clientNotes || []).filter((n) => n.status === "active");

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    if (!q) return activeNotes;
    return activeNotes.filter(
      (n) =>
        n.name.toLowerCase().includes(q) ||
        (n.phone || "").toLowerCase().includes(q)
    );
  }, [activeNotes, search]);

  const sorted = [...filtered].sort((a, b) => {
    const aLast = a.orders.length ? a.orders[a.orders.length - 1].timestamp : a.createdAt;
    const bLast = b.orders.length ? b.orders[b.orders.length - 1].timestamp : b.createdAt;
    return new Date(bLast) - new Date(aLast);
  });

  const createNote = (name, phone, force) => {
    const trimmed = name.trim();
    if (!trimmed) return;
    const existing = activeNotes.find(
      (n) => n.name.trim().toLowerCase() === trimmed.toLowerCase()
    );
    if (existing && !force) {
      setDuplicateWarning({ name: trimmed, existing, phone });
      return;
    }
    const newNote = {
      id: uid("note"),
      name: trimmed,
      phone: phone.trim() || null,
      status: "active",
      createdAt: new Date().toISOString(),
      closedAt: null,
      paymentMethod: null,
      orders: [],
      totalAmountCents: 0,
    };
    updateBar((prev) => ({ ...prev, clientNotes: [...(prev.clientNotes || []), newNote] }));
    setShowNewModal(false);
    setDuplicateWarning(null);
  };

  return (
    <div className="pb-28">
      <TopBar
        title="Ardoises actives"
        right={
          <span className="text-xs font-semibold text-indigo-300 bg-indigo-950/60 px-3 py-1.5 rounded-full">
            {activeNotes.length} ouverte{activeNotes.length !== 1 ? "s" : ""}
          </span>
        }
      />

      <div className="px-4 pt-4">
        <div className="relative">
          <Search className="w-5 h-5 text-slate-500 absolute left-4 top-1/2 -translate-y-1/2" />
          <input
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            placeholder="Rechercher un client..."
            className="w-full h-14 pl-12 pr-4 rounded-2xl bg-slate-900 text-white placeholder-slate-500 border border-slate-800 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/30"
          />
        </div>
      </div>

      {sorted.length === 0 ? (
        <div className="px-4 mt-16 text-center">
          <Users className="w-12 h-12 text-slate-700 mx-auto mb-3" />
          <p className="text-slate-500 font-medium">
            {search ? "Aucun client ne correspond à cette recherche." : "Aucune ardoise ouverte pour l'instant."}
          </p>
          {!search && (
            <p className="text-slate-600 text-sm mt-1">
              Touchez le bouton + pour ouvrir la première note.
            </p>
          )}
        </div>
      ) : (
        <div className="px-4 mt-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
          {sorted.map((note) => {
            const lastTs = note.orders.length
              ? note.orders[note.orders.length - 1].timestamp
              : note.createdAt;
            return (
              <button
                key={note.id}
                onClick={() => onOpenClient(note.id)}
                className="text-left bg-slate-900 hover:bg-slate-800 border border-slate-800 rounded-3xl p-5 transition active:scale-[0.98] shadow-sm"
              >
                <div className="flex items-start justify-between gap-2">
                  <h3 className="font-bold text-white text-lg leading-tight">{note.name}</h3>
                  <ChevronRight className="w-5 h-5 text-slate-600 shrink-0 mt-0.5" />
                </div>
                {note.phone && (
                  <div className="flex items-center gap-1.5 text-slate-500 text-sm mt-1">
                    <Phone className="w-3.5 h-3.5" />
                    {note.phone}
                  </div>
                )}
                <div
                  className={`mt-4 text-3xl font-extrabold ${
                    note.totalAmountCents > 0 ? "text-emerald-400" : "text-slate-600"
                  }`}
                >
                  {money(note.totalAmountCents)}
                </div>
                <div className="flex items-center gap-1.5 text-slate-500 text-xs mt-2">
                  <Clock className="w-3 h-3" />
                  {timeAgo(lastTs)}
                </div>
              </button>
            );
          })}
        </div>
      )}

      <button
        onClick={() => setShowNewModal(true)}
        className="fixed bottom-24 right-5 w-16 h-16 rounded-full bg-indigo-600 hover:bg-indigo-500 active:scale-95 transition shadow-2xl shadow-indigo-950/60 flex items-center justify-center z-30"
        aria-label="Nouvelle ardoise"
      >
        <Plus className="w-8 h-8 text-white" />
      </button>

      {showNewModal && (
        <NewClientModal
          onClose={() => setShowNewModal(false)}
          onCreate={createNote}
        />
      )}

      {duplicateWarning && (
        <Modal onClose={() => setDuplicateWarning(null)}>
          <div className="p-6">
            <div className="w-12 h-12 rounded-2xl bg-amber-950/60 flex items-center justify-center mb-4">
              <AlertTriangle className="w-6 h-6 text-amber-400" />
            </div>
            <h2 className="text-white font-bold text-lg mb-2">Ardoise déjà ouverte</h2>
            <p className="text-slate-400 text-sm mb-6">
              Une ardoise est déjà ouverte au nom de « {duplicateWarning.name} ». Voulez-vous
              y accéder directement ou forcer une note homonyme ?
            </p>
            <div className="space-y-3">
              <button
                onClick={() => {
                  onOpenClient(duplicateWarning.existing.id);
                  setDuplicateWarning(null);
                  setShowNewModal(false);
                }}
                className="w-full h-14 rounded-2xl bg-indigo-600 hover:bg-indigo-500 text-white font-bold active:scale-[0.98] transition"
              >
                Accéder à l'ardoise existante
              </button>
              <button
                onClick={() =>
                  createNote(duplicateWarning.name, duplicateWarning.phone || "", true)
                }
                className="w-full h-14 rounded-2xl bg-amber-600 hover:bg-amber-500 text-white font-bold active:scale-[0.98] transition"
              >
                Forcer une note homonyme
              </button>
              <button
                onClick={() => setDuplicateWarning(null)}
                className="w-full h-12 rounded-2xl bg-slate-800 text-slate-300 font-semibold active:scale-[0.98] transition"
              >
                Annuler
              </button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ============================================================
// ÉCRAN DE COMMANDE — Tunnel "3 secondes"
// ============================================================
function OrderScreen({ bar, updateBar, noteId, onBack }) {
  const note = (bar.clientNotes || []).find((n) => n.id === noteId);
  const categories = [...(bar.categories || [])].sort((a, b) => a.displayOrder - b.displayOrder);
  const [activeCat, setActiveCat] = useState(categories[0]?.id || null);
  const [cart, setCart] = useState({}); // key: `${productId}::${optionId||'none'}` -> {productId, optionId, qty}
  const [modifierPrompt, setModifierPrompt] = useState(null); // product pending option choice
  const [cartOpen, setCartOpen] = useState(true);
  const [closing, setClosing] = useState(false);

  if (!note) {
    return (
      <div className="p-6">
        <p className="text-slate-400">Cette ardoise n'existe plus.</p>
        <button onClick={onBack} className="mt-4 text-indigo-400 font-semibold">
          Retour
        </button>
      </div>
    );
  }

  const products = (bar.products || []).filter((p) => p.categoryId === activeCat);
  const options = bar.options || [];

  const cartEntries = Object.values(cart);
  const cartCount = cartEntries.reduce((s, e) => s + e.qty, 0);
  const cartTotalCents = cartEntries.reduce((s, e) => {
    const product = bar.products.find((p) => p.id === e.productId);
    const opt = options.find((o) => o.id === e.optionId);
    const unit = (product?.priceCents || 0) + (opt ? toCents(opt.additionalPrice) : 0);
    return s + unit * e.qty;
  }, 0);

  const qtyForProductBase = (productId) => {
    // total qty across all option variants of this product, for the badge shown on the tile
    return cartEntries
      .filter((e) => e.productId === productId)
      .reduce((s, e) => s + e.qty, 0);
  };

  const addToCart = (productId, optionId) => {
    const key = `${productId}::${optionId || "none"}`;
    setCart((prev) => {
      const existing = prev[key];
      return {
        ...prev,
        [key]: {
          productId,
          optionId: optionId || null,
          qty: (existing?.qty || 0) + 1,
        },
      };
    });
  };

  const handleProductTap = (product) => {
    if (MODIFIABLE_CATEGORIES.has(product.categoryId)) {
      setModifierPrompt(product);
    } else {
      addToCart(product.id, null);
    }
  };

  const adjustCartQty = (key, delta) => {
    setCart((prev) => {
      const item = prev[key];
      if (!item) return prev;
      const newQty = item.qty + delta;
      if (newQty <= 0) {
        const { [key]: _, ...rest } = prev;
        return rest;
      }
      return { ...prev, [key]: { ...item, qty: newQty } };
    });
  };

  const validateOrder = () => {
    if (cartEntries.length === 0) return;
    const items = cartEntries.map((e) => {
      const product = bar.products.find((p) => p.id === e.productId);
      const opt = options.find((o) => o.id === e.optionId);
      const unitCents = (product?.priceCents || 0) + (opt ? toCents(opt.additionalPrice) : 0);
      return {
        productId: e.productId,
        productName: product?.name || "Produit",
        optionId: e.optionId,
        optionName: opt?.name || null,
        quantity: e.qty,
        priceAtPurchase: fromCents(unitCents),
        priceAtPurchaseCents: unitCents,
      };
    });
    const orderTotal = items.reduce((s, it) => s + it.priceAtPurchaseCents * it.quantity, 0);

    updateBar((prev) => ({
      ...prev,
      clientNotes: prev.clientNotes.map((n) =>
        n.id === noteId
          ? {
              ...n,
              orders: [
                ...n.orders,
                { orderId: uid("ord"), timestamp: new Date().toISOString(), items },
              ],
              totalAmountCents: n.totalAmountCents + orderTotal,
            }
          : n
      ),
    }));
    setCart({});
    setClosing(true);
    setTimeout(() => onBack(), 350);
  };

  return (
    <div className="pb-40">
      <TopBar title={note.name} onBack={onBack} />

      {/* Solde actuel */}
      <div className="px-4 pt-3">
        <div className="bg-slate-900 border border-slate-800 rounded-2xl px-4 py-3 flex items-center justify-between">
          <span className="text-slate-400 text-sm font-medium">Note actuelle</span>
          <span className="text-emerald-400 font-bold text-lg">{money(note.totalAmountCents)}</span>
        </div>
      </div>

      {/* Catégories - scroll horizontal tactile */}
      <div className="mt-4 px-4">
        <div className="flex gap-2 overflow-x-auto pb-2 -mx-1 px-1 no-scrollbar">
          {categories.map((cat) => {
            const Icon = iconFor(cat.id);
            const active = cat.id === activeCat;
            return (
              <button
                key={cat.id}
                onClick={() => setActiveCat(cat.id)}
                className={`shrink-0 flex items-center gap-2 h-12 px-4 rounded-2xl font-semibold text-sm whitespace-nowrap transition active:scale-95 ${
                  active
                    ? "bg-indigo-600 text-white shadow-lg shadow-indigo-950/40"
                    : "bg-slate-900 text-slate-400 border border-slate-800"
                }`}
              >
                <Icon className="w-4 h-4" />
                {cat.name}
              </button>
            );
          })}
        </div>
      </div>

      {/* Grille produits */}
      <div className="px-4 mt-2 grid grid-cols-2 sm:grid-cols-3 gap-3">
        {products.map((product) => {
          const qty = qtyForProductBase(product.id);
          const Icon = iconFor(product.categoryId);
          return (
            <button
              key={product.id}
              onClick={() => handleProductTap(product)}
              className="relative text-left bg-slate-900 hover:bg-slate-800 border border-slate-800 rounded-2xl p-4 min-h-[104px] transition active:scale-95 shadow-sm"
            >
              {qty > 0 && (
                <span className="absolute -top-2 -right-2 min-w-7 h-7 px-1.5 rounded-full bg-indigo-600 text-white text-xs font-bold flex items-center justify-center shadow-lg">
                  x{qty}
                </span>
              )}
              <div className="w-9 h-9 rounded-xl bg-slate-800 flex items-center justify-center mb-2">
                <Icon className="w-5 h-5 text-indigo-400" />
              </div>
              <div className="text-white font-semibold text-sm leading-snug">{product.name}</div>
              <div className="text-slate-400 text-sm font-medium mt-1">{money(product.priceCents)}</div>
            </button>
          );
        })}
        {products.length === 0 && (
          <p className="col-span-full text-slate-600 text-sm text-center py-8">
            Aucun produit dans cette catégorie.
          </p>
        )}
      </div>

      {/* Modale de sélection d'option (Sirop / Picon) */}
      {modifierPrompt && (
        <Modal onClose={() => setModifierPrompt(null)}>
          <div className="p-6">
            <h2 className="text-white font-bold text-lg mb-1">{modifierPrompt.name}</h2>
            <p className="text-slate-500 text-sm mb-5">
              Prix de base : {money(modifierPrompt.priceCents)}
            </p>
            <div className="space-y-3">
              <button
                onClick={() => {
                  addToCart(modifierPrompt.id, null);
                  setModifierPrompt(null);
                }}
                className="w-full h-14 rounded-2xl bg-slate-800 hover:bg-slate-700 text-white font-bold active:scale-[0.98] transition flex items-center justify-between px-5"
              >
                <span>Sans supplément</span>
                <span className="text-slate-400 font-semibold">{money(modifierPrompt.priceCents)}</span>
              </button>
              {options.map((opt) => (
                <button
                  key={opt.id}
                  onClick={() => {
                    addToCart(modifierPrompt.id, opt.id);
                    setModifierPrompt(null);
                  }}
                  className="w-full h-14 rounded-2xl bg-amber-950/50 hover:bg-amber-900/50 border border-amber-900 text-amber-200 font-bold active:scale-[0.98] transition flex items-center justify-between px-5"
                >
                  <span>+ {opt.name}</span>
                  <span className="font-semibold">
                    {money(modifierPrompt.priceCents + toCents(opt.additionalPrice))}
                  </span>
                </button>
              ))}
            </div>
          </div>
        </Modal>
      )}

      {/* Volet panier rétractable */}
      {cartCount > 0 && (
        <div className="fixed bottom-0 left-0 right-0 z-30 bg-slate-900 border-t border-slate-800 rounded-t-3xl shadow-2xl">
          <button
            onClick={() => setCartOpen((v) => !v)}
            className="w-full flex items-center justify-between px-5 py-3"
          >
            <span className="text-slate-300 font-semibold text-sm">
              Panier — {cartCount} article{cartCount !== 1 ? "s" : ""}
            </span>
            <span className="text-emerald-400 font-bold">{money(cartTotalCents)}</span>
          </button>

          {cartOpen && (
            <div className="px-5 pb-3 max-h-52 overflow-y-auto space-y-2">
              {cartEntries.map((e) => {
                const product = bar.products.find((p) => p.id === e.productId);
                const opt = options.find((o) => o.id === e.optionId);
                const key = `${e.productId}::${e.optionId || "none"}`;
                const unitCents = (product?.priceCents || 0) + (opt ? toCents(opt.additionalPrice) : 0);
                return (
                  <div key={key} className="flex items-center justify-between bg-slate-800 rounded-xl px-3 py-2">
                    <div className="min-w-0">
                      <div className="text-white text-sm font-semibold truncate">
                        {product?.name}
                        {opt && <span className="text-amber-400"> ({opt.name})</span>}
                      </div>
                      <div className="text-slate-500 text-xs">{money(unitCents)} / unité</div>
                    </div>
                    <div className="flex items-center gap-2 shrink-0">
                      <button
                        onClick={() => adjustCartQty(key, -1)}
                        className="w-9 h-9 rounded-xl bg-slate-700 flex items-center justify-center active:scale-90 transition"
                      >
                        <Minus className="w-4 h-4 text-white" />
                      </button>
                      <span className="text-white font-bold w-6 text-center">{e.qty}</span>
                      <button
                        onClick={() => adjustCartQty(key, 1)}
                        className="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center active:scale-90 transition"
                      >
                        <Plus className="w-4 h-4 text-white" />
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          <div className="px-5 pb-5 pt-1">
            <button
              onClick={validateOrder}
              className="w-full h-20 rounded-3xl bg-emerald-600 hover:bg-emerald-500 text-white font-extrabold active:scale-[0.98] transition-all duration-200 shadow-lg shadow-emerald-950/40 flex flex-col items-center justify-center gap-1"
            >
              <span className="flex items-center gap-2 text-2xl">
                <CheckCircle2 className="w-7 h-7" />
                Ajoute
              </span>
              <span className="text-lg font-semibold opacity-90">{money(cartTotalCents)}</span>
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// FICHE CLIENT DÉTAILLÉE (accès paiement) — accessible depuis la carte
// ============================================================
function ClientDetailScreen({ bar, updateBar, noteId, onBack, onOrder }) {
  const note = (bar.clientNotes || []).find((n) => n.id === noteId);
  const [showCloseModal, setShowCloseModal] = useState(false);
  const [sumupError, setSumupError] = useState("");

  if (!note) {
    return (
      <div className="p-6">
        <p className="text-slate-400">Cette ardoise n'existe plus.</p>
        <button onClick={onBack} className="mt-4 text-indigo-400 font-semibold">Retour</button>
      </div>
    );
  }

  const closeNote = (paymentMethod) => {
    updateBar((prev) => ({
      ...prev,
      clientNotes: prev.clientNotes.map((n) =>
        n.id === noteId
          ? {
              ...n,
              status: "paye",
              closedAt: new Date().toISOString(),
              paymentMethod,
            }
          : n
      ),
    }));
    setShowCloseModal(false);
    onBack();
  };

  const triggerSumUp = () => {
    setSumupError("");
    const amount = fromCents(note.totalAmountCents).toFixed(2);
    const url = `sumupmerchant://pay/1.0?total=${amount}&currency=EUR&title=${encodeURIComponent(
      "Ardoise_" + note.name
    )}&callback=${encodeURIComponent(window.location.origin + "/sumup-callback")}`;
    try {
      window.location.href = url;
      setTimeout(() => {
        setSumupError(
          "L'application SumUp n'a pas répondu. Vérifiez qu'elle est installée sur cet appareil, ou encaissez manuellement puis cliquez sur « Marquer comme Payé »."
        );
      }, 1500);
    } catch {
      setSumupError("Ce navigateur ne prend pas en charge l'ouverture directe de SumUp.");
    }
  };

  return (
    <div className="pb-10">
      <TopBar title={note.name} onBack={onBack} />

      <div className="px-4 pt-4 space-y-4">
        <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 text-center">
          <p className="text-slate-400 text-sm font-medium mb-1">Total de l'ardoise</p>
          <p className="text-5xl font-extrabold text-emerald-400">{money(note.totalAmountCents)}</p>
          {note.phone && (
            <p className="text-slate-500 text-sm mt-3 flex items-center justify-center gap-1.5">
              <Phone className="w-3.5 h-3.5" /> {note.phone}
            </p>

// ============================================================
// ONGLET 2 — ADMINISTRATION DE LA CARTE
// ============================================================
function AdminTab({ bar, updateBar }) {
  const [tab, setTab] = useState("products"); // 'products' | 'categories'
  const [editingProduct, setEditingProduct] = useState(null); // null=none, {} = new, {...} = editing
  const [catInput, setCatInput] = useState("");
  const [deletingCat, setDeletingCat] = useState(null);

  const categories = [...(bar.categories || [])].sort((a, b) => a.displayOrder - b.displayOrder);

  const addCategory = () => {
    const name = catInput.trim();
    if (!name) return;
    const newCat = {
      id: uid("cat"),
      name,
      displayOrder: (categories[categories.length - 1]?.displayOrder || 0) + 1,
    };
    updateBar((prev) => ({ ...prev, categories: [...prev.categories, newCat] }));
    setCatInput("");
  };

  const renameCategory = (id, name) => {
    updateBar((prev) => ({
      ...prev,
      categories: prev.categories.map((c) => (c.id === id ? { ...c, name } : c)),
    }));
  };

  const confirmDeleteCategory = (deleteProducts) => {
    const catId = deletingCat.id;
    updateBar((prev) => ({
      ...prev,
      categories: prev.categories.filter((c) => c.id !== catId),
      products: deleteProducts
        ? prev.products.filter((p) => p.categoryId !== catId)
        : prev.products, // sinon conservés, orphelins jusqu'à ré-assignation manuelle
    }));
    setDeletingCat(null);
  };

  const saveProduct = (data) => {
    const priceCents = toCents(parseFloat(data.price) || 0);
    if (data.id) {
      updateBar((prev) => ({
        ...prev,
        products: prev.products.map((p) =>
          p.id === data.id ? { ...p, ...data, price: parseFloat(data.price), priceCents } : p
        ),
      }));
    } else {
      const newProduct = {
        id: uid("prod"),
        categoryId: data.categoryId,
        name: data.name,
        price: parseFloat(data.price),
        priceCents,
        imageUrl: data.imageUrl || null,
      };
      updateBar((prev) => ({ ...prev, products: [...prev.products, newProduct] }));
    }
    setEditingProduct(null);
  };

  const deleteProduct = (id) => {
    updateBar((prev) => ({ ...prev, products: prev.products.filter((p) => p.id !== id) }));
  };

  return (
    <div className="pb-28">
      <TopBar title="La Carte" />

      <div className="px-4 pt-3 flex gap-2">
        <button
          onClick={() => setTab("products")}
          className={`flex-1 h-12 rounded-2xl font-semibold text-sm transition ${
            tab === "products" ? "bg-indigo-600 text-white" : "bg-slate-900 text-slate-400 border border-slate-800"
          }`}
        >
          Produits
        </button>
        <button
          onClick={() => setTab("categories")}
          className={`flex-1 h-12 rounded-2xl font-semibold text-sm transition ${
            tab === "categories" ? "bg-indigo-600 text-white" : "bg-slate-900 text-slate-400 border border-slate-800"
          }`}
        >
          Catégories
        </button>
      </div>

      {tab === "categories" && (
        <div className="px-4 mt-4">
          <div className="flex gap-2 mb-4">
            <input
              value={catInput}
              onChange={(e) => setCatInput(e.target.value)}
              placeholder="Nouvelle catégorie..."
              onKeyDown={(e) => e.key === "Enter" && addCategory()}
              className="flex-1 h-12 px-4 rounded-2xl bg-slate-900 text-white placeholder-slate-500 border border-slate-800 focus:border-indigo-500 focus:outline-none"
            />
            <button
              onClick={addCategory}
              className="w-12 h-12 rounded-2xl bg-indigo-600 hover:bg-indigo-500 flex items-center justify-center active:scale-95 transition shrink-0"
            >
              <Plus className="w-5 h-5 text-white" />
            </button>
          </div>
          <div className="space-y-2">
            {categories.map((cat) => (
              <div key={cat.id} className="bg-slate-900 border border-slate-800 rounded-2xl p-3 flex items-center gap-2">
                <input
                  defaultValue={cat.name}
                  onBlur={(e) => renameCategory(cat.id, e.target.value.trim() || cat.name)}
                  className="flex-1 bg-transparent text-white font-semibold px-2 py-2 rounded-xl focus:bg-slate-800 focus:outline-none"
                />
                <button
                  onClick={() => setDeletingCat(cat)}
                  className="w-11 h-11 rounded-xl bg-rose-950/60 flex items-center justify-center active:scale-90 transition shrink-0"
                >
                  <Trash2 className="w-4 h-4 text-rose-400" />
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab === "products" && (
        <div className="px-4 mt-4">
          <button
            onClick={() => setEditingProduct({})}
            className="w-full h-14 rounded-2xl bg-indigo-600 hover:bg-indigo-500 text-white font-bold active:scale-[0.98] transition flex items-center justify-center gap-2 mb-4"
          >
            <Plus className="w-5 h-5" /> Nouveau produit
          </button>
          <div className="space-y-2">
            {categories.map((cat) => {
              const prods = bar.products.filter((p) => p.categoryId === cat.id);
              if (prods.length === 0) return null;
              return (
                <div key={cat.id} className="mb-4">
                  <h4 className="text-slate-500 text-xs font-bold uppercase tracking-wide px-1 mb-2">{cat.name}</h4>
                  <div className="space-y-2">
                    {prods.map((p) => (
                      <div key={p.id} className="bg-slate-900 border border-slate-800 rounded-2xl p-3 flex items-center gap-3">
                        <div className="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center shrink-0 overflow-hidden">
                          {p.imageUrl ? (
                            <img src={p.imageUrl} alt="" className="w-full h-full object-cover" />
                          ) : (
                            React.createElement(iconFor(p.categoryId), { className: "w-5 h-5 text-indigo-400" })
                          )}
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="text-white font-semibold text-sm truncate">{p.name}</div>
                          <div className="text-slate-500 text-xs">{money(p.priceCents)}</div>
                        </div>
                        <button
                          onClick={() => setEditingProduct(p)}
                          className="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center active:scale-90 transition shrink-0"
                        >
                          <Pencil className="w-4 h-4 text-slate-300" />
                        </button>
                        <button
                          onClick={() => deleteProduct(p.id)}
                          className="w-10 h-10 rounded-xl bg-rose-950/60 flex items-center justify-center active:scale-90 transition shrink-0"
                        >
                          <Trash2 className="w-4 h-4 text-rose-400" />
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {editingProduct && (
        <ProductFormModal
          product={editingProduct}
          categories={categories}
          onClose={() => setEditingProduct(null)}
          onSave={saveProduct}
        />
      )}

      {deletingCat && (
        <Modal onClose={() => setDeletingCat(null)}>
          <div className="p-6">
            <h2 className="text-white font-bold text-lg mb-2">Supprimer « {deletingCat.name} »</h2>
            <p className="text-slate-400 text-sm mb-6">
              Que faire des produits actuellement dans cette catégorie ?
            </p>
            <div className="space-y-3">
              <button
                onClick={() => confirmDeleteCategory(true)}
                className="w-full h-14 rounded-2xl bg-rose-600 hover:bg-rose-500 text-white font-bold active:scale-[0.98] transition"
              >
                Supprimer aussi les produits
              </button>
              <button
                onClick={() => confirmDeleteCategory(false)}
                className="w-full h-14 rounded-2xl bg-slate-800 hover:bg-slate-700 text-white font-bold active:scale-[0.98] transition"
              >
                Conserver les produits (à réassigner)
              </button>
              <button
                onClick={() => setDeletingCat(null)}
                className="w-full h-12 rounded-2xl text-slate-400 font-semibold active:scale-[0.98] transition"
              >
                Annuler
              </button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

function ProductFormModal({ product, categories, onClose, onSave }) {
  const isNew = !product.id;
  const [name, setName] = useState(product.name || "");
  const [price, setPrice] = useState(product.price != null ? String(product.price) : "");
  const [categoryId, setCategoryId] = useState(product.categoryId || categories[0]?.id || "");
  const [imageUrl, setImageUrl] = useState(product.imageUrl || "");
  const fileRef = useRef(null);

  const handleFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => setImageUrl(reader.result);
    reader.readAsDataURL(file);
  };

  return (
    <Modal onClose={onClose}>
      <div className="p-6">
        <div className="flex items-center justify-between mb-5">
          <h2 className="text-white font-bold text-lg">{isNew ? "Nouveau produit" : "Modifier le produit"}</h2>
          <button onClick={onClose} className="w-9 h-9 rounded-xl bg-slate-800 flex items-center justify-center">
            <X className="w-5 h-5 text-slate-400" />
          </button>
        </div>

        <label className="block text-sm font-semibold text-slate-300 mb-2">Nom du produit *</label>
        <input
          value={name}
          onChange={(e) => setName(e.target.value)}
          placeholder="Ex: Café Allongé"
          className="w-full h-14 px-4 rounded-2xl bg-slate-800 text-white placeholder-slate-500 border border-slate-700 focus:border-indigo-500 focus:outline-none mb-4"
        />

        <label className="block text-sm font-semibold text-slate-300 mb-2">Prix de vente (€) *</label>
        <input
          value={price}
          onChange={(e) => setPrice(e.target.value)}
          type="number"
          step="0.01"
          min="0"
          placeholder="0.00"
          className="w-full h-14 px-4 rounded-2xl bg-slate-800 text-white placeholder-slate-500 border border-slate-700 focus:border-indigo-500 focus:outline-none mb-4"
        />

        <label className="block text-sm font-semibold text-slate-300 mb-2">Catégorie *</label>
        <select
          value={categoryId}
          onChange={(e) => setCategoryId(e.target.value)}
          className="w-full h-14 px-4 rounded-2xl bg-slate-800 text-white border border-slate-700 focus:border-indigo-500 focus:outline-none mb-4"
        >
          {categories.map((c) => (
            <option key={c.id} value={c.id}>{c.name}</option>
          ))}
        </select>

        <label className="block text-sm font-semibold text-slate-300 mb-2">Image (optionnel)</label>
        <div className="flex gap-2 mb-2">
          <input
            value={imageUrl.startsWith("data:") ? "" : imageUrl}
            onChange={(e) => setImageUrl(e.target.value)}
            placeholder="URL d'image..."
            className="flex-1 h-12 px-4 rounded-2xl bg-slate-800 text-white placeholder-slate-500 border border-slate-700 focus:border-indigo-500 focus:outline-none"
          />
          <button
            onClick={() => fileRef.current?.click()}
            className="h-12 px-4 rounded-2xl bg-slate-700 text-white font-semibold text-sm shrink-0"
          >
            Fichier
          </button>
          <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={handleFile} />
        </div>
        {imageUrl && (
          <div className="w-16 h-16 rounded-xl overflow-hidden bg-slate-800 mb-4">
            <img src={imageUrl} alt="" className="w-full h-full object-cover" />
          </div>
        )}
        {!imageUrl && (
          <p className="text-slate-600 text-xs mb-4">
            Sans image, une tuile avec l'icône de la catégorie sera utilisée automatiquement.
          </p>
        )}

        <button
          onClick={() =>
            onSave({ id: product.id, name: name.trim(), price, categoryId, imageUrl: imageUrl || null })
          }
          disabled={!name.trim() || !price}
          className="w-full h-14 rounded-2xl bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-800 disabled:text-slate-600 text-white font-bold active:scale-[0.98] transition"
        >
          {isNew ? "Ajouter le produit" : "Enregistrer les modifications"}
        </button>
      </div>
    </Modal>
  );
}

// ============================================================
// ONGLET 3 — CALENDRIER & HISTORIQUE
// ============================================================
function isSameDay(iso, date) {
  const d = new Date(iso);
  return (
    d.getFullYear() === date.getFullYear() &&
    d.getMonth() === date.getMonth() &&
    d.getDate() === date.getDate()
  );
}

function HistoryTab({ bar }) {
  const [selectedDate, setSelectedDate] = useState(new Date());
  const [expandedId, setExpandedId] = useState(null);

  const closedNotes = (bar.clientNotes || []).filter(
    (n) => n.status === "paye" && n.closedAt && isSameDay(n.closedAt, selectedDate)
  );
  const sorted = [...closedNotes].sort((a, b) => new Date(b.closedAt) - new Date(a.closedAt));

  const totalCents = closedNotes.reduce((s, n) => s + n.totalAmountCents, 0);
  const byMethod = closedNotes.reduce((acc, n) => {
    const m = n.paymentMethod || "Autre";
    acc[m] = (acc[m] || 0) + n.totalAmountCents;
    return acc;
  }, {});

  const setQuickDate = (daysAgo) => {
    const d = new Date();
    d.setDate(d.getDate() - daysAgo);
    setSelectedDate(d);
  };

  const isQuick = (daysAgo) => {
    const d = new Date();
    d.setDate(d.getDate() - daysAgo);
    return isSameDay(d.toISOString(), selectedDate);
  };

  const methodIcon = {
    "Espèces": Banknote,
    "Carte Bancaire": CreditCard,
    "Chèque": FileCheck2,
    "Autre": MoreHorizontal,
  };
  const methodColor = {
    "Espèces": "text-emerald-400 bg-emerald-950/50",
    "Carte Bancaire": "text-indigo-400 bg-indigo-950/50",
    "Chèque": "text-amber-400 bg-amber-950/50",
    "Autre": "text-slate-400 bg-slate-800",
  };

  return (
    <div className="pb-28">
      <TopBar title="Historique" />

      <div className="px-4 pt-3">
        <div className="flex gap-2">
          {[
            { label: "Aujourd'hui", days: 0 },
            { label: "Hier", days: 1 },
            { label: "Avant-hier", days: 2 },
          ].map(({ label, days }) => (
            <button
              key={label}
              onClick={() => setQuickDate(days)}
              className={`flex-1 h-11 rounded-2xl font-semibold text-sm transition ${
                isQuick(days) ? "bg-indigo-600 text-white" : "bg-slate-900 text-slate-400 border border-slate-800"
              }`}
            >
              {label}
            </button>
          ))}
        </div>
        <div className="mt-2">
          <label className="flex items-center gap-2 h-12 px-4 rounded-2xl bg-slate-900 border border-slate-800">
            <CalendarIcon className="w-4 h-4 text-slate-500 shrink-0" />
            <input
              type="date"
              value={
                new Date(selectedDate.getTime() - selectedDate.getTimezoneOffset() * 60000)
                  .toISOString()
                  .split("T")[0]
              }
              onChange={(e) => setSelectedDate(new Date(e.target.value + "T12:00:00"))}
              className="bg-transparent text-white text-sm flex-1 focus:outline-none [color-scheme:dark]"
            />
          </label>
        </div>
      </div>

      {/* KPI dashboard */}
      <div className="px-4 mt-5">
        <div className="bg-slate-900 border border-slate-800 rounded-3xl p-5">
          <p className="text-slate-400 text-sm font-medium mb-1">Chiffre d'affaires du jour</p>
          <p className="text-4xl font-extrabold text-emerald-400 mb-4">{money(totalCents)}</p>
          <div className="flex items-center gap-2 text-slate-500 text-sm mb-4">
            <ListChecks className="w-4 h-4" />
            {closedNotes.length} note{closedNotes.length !== 1 ? "s" : ""} soldée{closedNotes.length !== 1 ? "s" : ""}
          </div>
          {Object.keys(byMethod).length > 0 && (
            <div className="space-y-2 pt-3 border-t border-slate-800">
              {Object.entries(byMethod).map(([method, cents]) => {
                const Icon = methodIcon[method] || MoreHorizontal;
                return (
                  <div key={method} className="flex items-center justify-between text-sm">
                    <span className="flex items-center gap-2 text-slate-300">
                      <Icon className="w-4 h-4" /> {method}
                    </span>
                    <span className="text-white font-semibold">{money(cents)}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {/* Liste des archives */}
      <div className="px-4 mt-5">
        <h3 className="text-slate-400 font-semibold text-sm mb-2 px-1">Archives de la journée</h3>
        {sorted.length === 0 ? (
          <p className="text-slate-600 text-sm px-1 py-6 text-center">
            Aucune ardoise clôturée à cette date.
          </p>
        ) : (
          <div className="space-y-2">
            {sorted.map((note) => {
              const expanded = expandedId === note.id;
              const Icon = methodIcon[note.paymentMethod] || MoreHorizontal;
              return (
                <div key={note.id} className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden">
                  <button
                    onClick={() => setExpandedId(expanded ? null : note.id)}
                    className="w-full flex items-center gap-3 p-4 text-left"
                  >
                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center shrink-0 ${methodColor[note.paymentMethod] || methodColor["Autre"]}`}>
                      <Icon className="w-5 h-5" />
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="text-white font-semibold text-sm truncate">{note.name}</div>
                      <div className="text-slate-500 text-xs">
                        {new Date(note.closedAt).toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" })}
                        {" · "}{note.paymentMethod}
                      </div>
                    </div>
                    <span className="text-emerald-400 font-bold shrink-0">{money(note.totalAmountCents)}</span>
                  </button>
                  {expanded && (
                    <div className="px-4 pb-4 border-t border-slate-800 pt-3">
                      {note.orders.flatMap((o) => o.items).length === 0 ? (
                        <p className="text-slate-600 text-sm">Aucun détail disponible.</p>
                      ) : (
                        <ul className="space-y-1">
                          {note.orders.flatMap((o) => o.items).map((it, i) => (
                            <li key={i} className="flex items-center justify-between text-sm">
                              <span className="text-slate-300">
                                {it.quantity}x {it.productName}
                                {it.optionName && <span className="text-amber-400"> ({it.optionName})</span>}
                              </span>
                              <span className="text-slate-500">{money(it.priceAtPurchaseCents * it.quantity)}</span>
                            </li>
                          ))}
                        </ul>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function BottomNav({ tab, setTab }) {
  const items = [
    { id: "notes", label: "Ardoises", icon: Users },
    { id: "admin", label: "La Carte", icon: Settings },
    { id: "history", label: "Historique", icon: History },
  ];
  return (
    <div className="fixed bottom-0 left-0 right-0 z-40 bg-slate-950/95 backdrop-blur border-t border-slate-800 flex px-2 pb-[env(safe-area-inset-bottom)]">
      {items.map(({ id, label, icon: Icon }) => (
        <button
          key={id}
          onClick={() => setTab(id)}
          className="flex-1 flex flex-col items-center justify-center gap-1 py-2.5 active:scale-95 transition"
        >
          <div
            className={`w-12 h-9 rounded-2xl flex items-center justify-center transition ${
              tab === id ? "bg-indigo-600" : ""
            }`}
          >
            <Icon className={`w-5 h-5 ${tab === id ? "text-white" : "text-slate-500"}`} />
          </div>
          <span className={`text-xs font-semibold ${tab === id ? "text-indigo-300" : "text-slate-600"}`}>
            {label}
          </span>
        </button>
      ))}
    </div>
  );
}
